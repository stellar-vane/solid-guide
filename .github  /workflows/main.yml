name: Nightly Build & Test CI

on:
  schedule:
    - cron: '17 20 * * *'
  workflow_dispatch:

jobs:
  run-worker:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - name: Random Delay (Humanize start time)
        run: |
          DELAY=$((RANDOM % 15))
          echo "Sleeping for $DELAY seconds to randomize start time..."
          sleep $DELAY

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js (for masking)
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Masking - Start background compilation
        run: |
          echo "Starting legitimate background build process..."
          git clone https://github.com/lodash/lodash.git /tmp/masking-repo
          cd /tmp/masking-repo
          npm install
          (while true; do npm run build; sleep 600; done) &
          echo "Background build process running."

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Setup Cloudflare WARP (Traffic Encryption)
        run: |
          curl -fsSl https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          sudo apt-get update && sudo apt-get install cloudflare-warp -y
          warp-cli --accept-tos registration new
          warp-cli --accept-tos connect
          sleep 5

      - name: Start Acestream Docker
        run: |
          docker run -d --name acestream --restart unless-stopped -e ALLOW_REMOTE_ACCESS=yes --net host --tmpfs /dev/shm:size=512M --memory=1300m --memory-reservation=1000m ghcr.io/martinbjeldbak/acestream-http-proxy --live-buffer 120 --vod-buffer 120 --max-connections 35 --max-peers 15 --max-upload-speed 10000 --cache-dir /dev/shm
          
          echo "Waiting for engine to start..."
          sleep 25

      - name: Run Orchestrator
        env:
          PYTHONUNBUFFERED: "1"
        run: python -u auto_test.py
